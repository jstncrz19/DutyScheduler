<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle for visual appeal -->
  <circle cx="32" cy="32" r="31" fill="#faf8f5" stroke="#a8ad80" stroke-width="1"/>
  
  <!-- Calendar body -->
  <rect x="12" y="16" width="40" height="36" rx="2" fill="none" stroke="#8a8f68" stroke-width="2"/>
  
  <!-- Calendar top bar -->
  <rect x="12" y="16" width="40" height="8" fill="#a8ad80" rx="2"/>
  
  <!-- Calendar holes (for spiral binding look) -->
  <circle cx="18" cy="20" r="1.5" fill="#faf8f5"/>
  <circle cx="32" cy="20" r="1.5" fill="#faf8f5"/>
  <circle cx="46" cy="20" r="1.5" fill="#faf8f5"/>
  
  <!-- Calendar grid lines -->
  <line x1="12" y1="28" x2="52" y2="28" stroke="#a98b76" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="36" x2="52" y2="36" stroke="#a98b76" stroke-width="1" opacity="0.5"/>
  
  <!-- Vertical grid lines -->
  <line x1="24" y1="24" x2="24" y2="52" stroke="#a98b76" stroke-width="1" opacity="0.5"/>
  <line x1="36" y1="24" x2="36" y2="52" stroke="#a98b76" stroke-width="1" opacity="0.5"/>
  
  <!-- Small date numbers on calendar -->
  <text x="16" y="32" font-size="6" fill="#8a8f68" font-weight="bold">15</text>
  <text x="28" y="32" font-size="6" fill="#8a8f68" font-weight="bold">16</text>
  <text x="40" y="32" font-size="6" fill="#8a8f68" font-weight="bold">17</text>
  
  <!-- Heart in bottom right corner -->
  <g transform="translate(42, 42)">
    <!-- Heart shape -->
    <path d="M0,-3 C-2,-5 -6,-5 -6,-1 C-6,2 -3,5 0,7 C3,5 6,2 6,-1 C6,-5 2,-5 0,-3 Z" 
          fill="#a98b76" stroke="#a98b76" stroke-width="0.5"/>
  </g>
</svg>
